<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paw Bakery 🐾</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Room Decor Background (Now an image) -->
        <div id="room-bg"></div>

        <!-- Selection Screen -->
        <div id="selection-screen" class="overlay">
            <h1>Escolha seu Pet 🌸</h1>
            <div class="pet-options">
                <div class="pet-option" data-pet="pandi">
                    <img class="pet-preview-img" src="assets/pandi.png" alt="Pandi">
                    <span>Pandi</span>
                </div>
                <div class="pet-option" data-pet="foxy">
                    <img class="pet-preview-img" src="assets/foxy.png" alt="Foxy">
                    <span>Foxy</span>
                </div>
                <div class="pet-option" data-pet="mimi">
                    <img class="pet-preview-img" src="assets/mimi.png" alt="Mimi">
                    <span>Mimi</span>
                </div>
            </div>
            <button id="start-game" class="main-btn">Começar!</button>
        </div>

        <!-- Accessory Wardrobe Overlay -->
        <div id="wardrobe-screen" class="overlay" style="display: none;">
            <h1>Acessórios 🎀</h1>
            <div class="wardrobe-grid">
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="bow" data-price="0">🎀</button>
                    <span class="price-tag">Grátis</span>
                </div>
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="crown" data-price="30">👑</button>
                    <span class="price-tag">🪙 30</span>
                </div>
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="flower" data-price="15">🌸</button>
                    <span class="price-tag">🪙 15</span>
                </div>
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="hat" data-price="50">🎩</button>
                    <span class="price-tag">🪙 50</span>
                </div>
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="star" data-price="25">⭐</button>
                    <span class="price-tag">🪙 25</span>
                </div>
                <div class="wardrobe-item-box">
                    <button class="wardrobe-item" data-acc="none">❌</button>
                    <span class="price-tag">-</span>
                </div>
            </div>
            <button id="close-wardrobe" class="main-btn">Voltar</button>
        </div>

        <!-- Minigame Screen -->
        <div id="minigame-screen" class="overlay" style="display: none;">
            <h1>Donut Run! 🍩</h1>
            <canvas id="minigame-canvas" width="400" height="600"></canvas>
            <div id="minigame-hud">
                <span id="mg-score">🍩 0</span>
                <button id="mg-quit" class="main-btn mini-btn">Voltar</button>
            </div>
        </div>

        <!-- Status Bars -->
        <div class="status-area">
            <div class="status-item">
                <span class="status-icon">🍰</span>
                <div class="bar-container">
                    <div id="hunger-bar" class="bar-fill bar-hunger"></div>
                </div>
            </div>
            <div class="status-item">
                <span class="status-icon">🧼</span>
                <div class="bar-container">
                    <div id="hygiene-bar" class="bar-fill bar-hygiene"></div>
                </div>
            </div>
            <div class="status-item">
                <span class="status-icon">⭐</span>
                <div class="bar-container">
                    <div id="happiness-bar" class="bar-fill bar-happiness"></div>
                </div>
            </div>
        </div>
        
        <!-- Coin HUD -->
        <div id="coin-hud">🪙 <span id="coin-count">50</span></div>


        <!-- Pet Interaction Area -->
        <div class="pet-area" id="pet-area">
            <div id="dirt-overlay" class="dirt-overlay"></div>
            <div id="pet" class="pet-idle">
                <img id="pet-img" src="assets/pandi.png" alt="Pet">
                <div id="pet-accessory" class="pet-accessory"></div>
            </div>
            <div id="fx-container" class="fx-container"></div>
        </div>

        <!-- Controls Area -->
        <div class="controls-area">
            <div class="menu-container">
                <button id="btn-food" class="control-btn" title="Alimentar">🍓</button>
                <div id="food-menu" class="sub-menu">
                    <button class="food-opt" data-emoji="🍓">🍓</button>
                    <button class="food-opt" data-emoji="🧁">🧁</button>
                    <button class="food-opt" data-emoji="🥛">🥛</button>
                    <button class="food-opt" data-emoji="🍩">🍩</button>
                    <button class="food-opt" data-emoji="🍪">🍪</button>
                    <button class="food-opt" data-emoji="🥞">🥞</button>
                </div>
            </div>
            <button id="btn-bath" class="control-btn" title="Banho">🛁</button>
            <button id="btn-minigame" class="control-btn" title="Minigame">🎮</button>
            <button id="btn-shop" class="control-btn" title="Acessório">🎀</button>
        </div>
    </div>

    <!-- Emoji drag cursor -->
    <div id="drag-cursor" class="drag-cursor"></div>

    <script src="script.js"></script>
</body>

</html>
